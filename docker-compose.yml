services:
  postgres:
    image: postgres:17-alpine
    container_name: superbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: superbot
      POSTGRES_PASSWORD: superbot_secret
      POSTGRES_DB: superbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superbot -d superbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  spicedb:
    image: authzed/spicedb:latest
    container_name: superbot-spicedb
    restart: unless-stopped
    command: [ "serve", "--grpc-preshared-key", "my-secret-token", "--http-enabled", "false" ]
    ports:
      - "50051:50051"
    depends_on:
      - postgres # SpiceDB нужна база данных для своих данных
    environment:
      - SPICEDB_GRPC_PRESHARED_KEY=my-secret-token
      - SPICEDB_DATASTORE_ENGINE=postgres
      - SPICEDB_DATASTORE_CONN_URI=postgres://superbot:superbot_secret@postgres:5432/superbot?sslmode=disable
    networks:
      - superbot

  postgres-plugins:
    image: postgres:17-alpine
    container_name: superbot-postgres-plugins
    restart: unless-stopped
    environment:
      POSTGRES_USER: plugins
      POSTGRES_PASSWORD: plugins_secret
      POSTGRES_DB: plugins
    volumes:
      - pgdata_plugins:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plugins -d plugins"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  redis:
    image: redis:7-alpine
    container_name: superbot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  minio:
    image: minio/minio:latest
    container_name: superbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  minio-init:
    image: minio/mc:latest
    container_name: superbot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/wasm-plugins &&
      echo 'Bucket wasm-plugins created'
      "
    networks:
      - superbot

volumes:
  pgdata:
  pgdata_plugins:
  redisdata:
  miniodata:

networks:
  superbot:
    driver: bridge
