services:
  postgres:
    image: postgres:17-alpine
    container_name: superbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: superbot
      POSTGRES_PASSWORD: superbot_secret
      POSTGRES_DB: superbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superbot -d superbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  redis:
    image: redis:7-alpine
    container_name: superbot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

volumes:
  pgdata:
  redisdata:

networks:
  superbot:
    driver: bridge
