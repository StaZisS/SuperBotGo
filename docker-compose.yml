services:
  postgres:
    image: postgres:17-alpine
    container_name: superbot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: superbot
      POSTGRES_PASSWORD: superbot_secret
      POSTGRES_DB: superbot
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U superbot -d superbot"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  redis:
    image: redis:7-alpine
    container_name: superbot-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  minio:
    image: minio/minio:latest
    container_name: superbot-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - superbot

  minio-init:
    image: minio/mc:latest
    container_name: superbot-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/wasm-plugins &&
      echo 'Bucket wasm-plugins created'
      "
    networks:
      - superbot

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  superbot:
    driver: bridge
